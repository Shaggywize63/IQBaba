<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Portal Login | IQ Baba</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body {
            background: #0f172a;
            color: white;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .login-bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
        }

        .shape-1 {
            width: 400px;
            height: 400px;
            background: var(--primary-color);
            top: -100px;
            left: -100px;
            animation: float 10s infinite alternate;
        }

        .shape-2 {
            width: 300px;
            height: 300px;
            background: var(--accent-blue);
            bottom: -50px;
            right: -50px;
            animation: float-delayed 12s infinite alternate;
        }

        .login-card-v2 {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 32px;
            padding: 4rem 3rem;
            width: 100%;
            max-width: 480px;
            z-index: 10;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            animation: slideIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .login-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .login-header h1 {
            color: white;
            font-size: 2.5rem;
            letter-spacing: -0.03em;
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        .form-label {
            color: #94a3b8;
            font-weight: 500;
            margin-bottom: 0.75rem;
        }

        .form-control-v2 {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 1.25rem 1.5rem;
            border-radius: 16px;
            width: 100%;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control-v2:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 0 0 4px rgba(59, 113, 159, 0.2);
        }

        .btn-premium {
            background: var(--primary-color);
            color: white;
            padding: 1.25rem;
            border-radius: 16px;
            font-weight: 700;
            width: 100%;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            box-shadow: 0 10px 20px rgba(59, 113, 159, 0.3);
        }

        .btn-premium:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(59, 113, 159, 0.4);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2.5rem;
            color: #64748b;
            text-decoration: none;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: white;
        }

        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(30px, 50px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-bg-shapes">
            <div class="shape shape-1"></div>
            <div class="shape shape-2"></div>
        </div>
        
        <div class="login-card-v2">
            <div class="login-header">
                <img src="media/logo.png" alt="IQ BABA Logo" style="height: 100px; margin-bottom: 1.5rem;">
                <p>School Portal Administration</p>
            </div>
            
            <form id="schoolLoginForm">
                <div class="form-group">
                    <label class="form-label" for="username">Institutional Email</label>
                    <input type="email" id="username" name="username" class="form-control-v2" placeholder="admin@school.edu" required>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control-v2" placeholder="••••••••" required>
                </div>
                
                <div class="flex items-center gap-2 mb-6">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe" style="color: #64748b; font-size: 0.9rem; cursor: pointer;">Remember this session</label>
                </div>
                
                <button type="submit" class="btn btn-premium btn-glow">Enter Portal</button>
            </form>
            
            <a href="index.html" class="back-link">
                &larr; Return to Landing Page
            </a>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.getElementById('schoolLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const formData = window.serializeForm(this);
            const submitBtn = this.querySelector('button[type="submit"]');
            
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = 'Authenticating...';
                
                await window.api.login(formData.username, formData.password, 'school');
                
                window.showNotification('Welcome back. Access granted.', 'success');
                
                setTimeout(() => {
                    window.location.href = 'school-dashboard.html';
                }, 800);
            } catch (error) {
                window.showNotification(error.message || 'Access Denied: Invalid Institutional Credentials.', 'danger');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Enter Portal';
            }
        });
    </script>
</body>
</html>
