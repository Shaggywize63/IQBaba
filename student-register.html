<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Start your journey | IQ Baba</title>
    <link rel="icon" href="media/logo.png">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        body { background: var(--bg-main); cursor: none; overflow-x: hidden; }
        @media (max-width: 1024px) { body { cursor: auto; } }

        .reg-shell {
            min-height: 100vh;
            padding: 6rem 1.5rem 4rem;
            display: flex; flex-direction: column; align-items: center;
            position: relative;
        }
        .reg-shell::before {
            content: ""; position: absolute; top: -120px; left: -120px;
            width: 460px; height: 460px; border-radius: 50%;
            background: radial-gradient(circle, var(--secondary-color) 0%, transparent 65%);
            opacity: 0.4; z-index: -1;
        }
        .reg-shell::after {
            content: ""; position: absolute; bottom: -180px; right: -120px;
            width: 520px; height: 520px; border-radius: 50%;
            background: radial-gradient(circle, var(--primary-color) 0%, transparent 65%);
            opacity: 0.3; z-index: -1;
        }
        .reg-back {
            position: absolute; top: 2rem; left: 2rem;
            font-family: var(--font-heading); font-weight: 600;
            color: var(--text-grey); font-size: 0.9rem;
        }
        .reg-back:hover { color: var(--accent-deep); }
        .reg-brand {
            position: absolute; top: 2rem; right: 2rem;
            display: flex; align-items: center; gap: 0.6rem;
            font-family: var(--font-heading); font-weight: 800; color: var(--accent-deep);
        }
        .reg-brand img { height: 36px; }

        .reg-card {
            width: 100%; max-width: 980px;
            background: white;
            border-radius: 36px;
            padding: clamp(2rem, 5vw, 4rem);
            border: 1px solid rgba(14,42,71,0.08);
            box-shadow: 0 50px 120px -40px rgba(14,42,71,0.18);
        }
        .reg-head { display: flex; justify-content: space-between; gap: 2rem; align-items: flex-end; margin-bottom: 3rem; flex-wrap: wrap; }
        .reg-head h1 {
            font-family: var(--font-heading); font-weight: 800;
            font-size: clamp(2.2rem, 4.5vw, 3.6rem);
            line-height: 1; letter-spacing: -0.035em;
            color: var(--accent-deep); margin: 0; max-width: 18ch;
        }
        .reg-head h1 em { font-family: var(--font-serif); font-style: italic; font-weight: 400; color: var(--secondary-color); }
        .reg-progress {
            font-family: var(--font-heading); font-size: 0.78rem;
            letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-grey);
        }

        .section-line {
            display: flex; align-items: center; gap: 1rem;
            margin-bottom: 1.6rem;
        }
        .section-line .num {
            width: 32px; height: 32px; flex: none; border-radius: 50%;
            background: var(--accent-deep); color: var(--accent-yellow);
            display: inline-flex; align-items: center; justify-content: center;
            font-family: var(--font-heading); font-weight: 800; font-size: 0.85rem;
        }
        .section-line span {
            font-family: var(--font-heading); font-weight: 700; color: var(--accent-deep);
            font-size: 1.05rem; letter-spacing: -0.01em;
        }
        .section-line::after {
            content: ""; flex: 1; height: 1px; background: rgba(14,42,71,0.12);
        }

        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.2rem; margin-bottom: 3rem; }
        @media (max-width: 720px) { .field-grid { grid-template-columns: 1fr; } }
        .field { display: flex; flex-direction: column; gap: 0.5rem; }
        .field label {
            font-family: var(--font-heading); font-size: 0.72rem;
            letter-spacing: 0.16em; text-transform: uppercase;
            color: var(--accent-deep); font-weight: 600;
        }
        .input, select.input {
            width: 100%; padding: 1.05rem 1.2rem; font-size: 1rem;
            background: var(--bg-main); border: 1.5px solid rgba(14,42,71,0.1);
            border-radius: 16px; color: var(--accent-deep);
            font-family: var(--font-family);
            transition: all 0.25s ease;
        }
        select.input {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%230E2A47' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 1rem center; background-repeat: no-repeat;
            background-size: 1.2em; padding-right: 2.6rem;
        }
        .input::placeholder { color: var(--text-light); }
        .input:focus {
            outline: none; border-color: var(--accent-deep);
            background: white;
            box-shadow: 0 0 0 4px rgba(14,42,71,0.08);
        }

        .helper { font-size: 0.92rem; color: var(--text-grey); margin-bottom: 1.2rem; }

        .subj-tag-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 0.75rem;
        }
        .subject-tag {
            position: relative; cursor: pointer;
            background: white; border: 1.5px solid rgba(14,42,71,0.12);
            padding: 1rem 1.2rem; border-radius: 16px;
            display: flex; align-items: center; gap: 0.7rem;
            font-family: var(--font-heading); font-weight: 600; font-size: 0.95rem;
            color: var(--accent-deep);
            transition: all 0.25s ease;
        }
        .subject-tag:hover { border-color: var(--accent-deep); transform: translateY(-2px); }
        .subject-tag input { display: none; }
        .subject-tag .chk {
            width: 20px; height: 20px; flex: none; border-radius: 7px;
            border: 1.5px solid rgba(14,42,71,0.25);
            display: inline-flex; align-items: center; justify-content: center;
            color: white; font-size: 0.7rem;
        }
        .subject-tag.selected {
            background: var(--accent-deep); color: white; border-color: var(--accent-deep);
        }
        .subject-tag.selected .chk {
            background: var(--accent-yellow); border-color: var(--accent-yellow); color: var(--accent-deep);
        }
        .subject-tag.selected .chk::before { content: "✓"; font-weight: 700; }

        .err-tag {
            display: none; margin-top: 0.9rem;
            font-family: var(--font-heading); font-weight: 600; color: #B91C3C; font-size: 0.9rem;
        }

        .reg-footer {
            display: flex; justify-content: space-between; align-items: center; gap: 1rem;
            margin-top: 2.5rem; flex-wrap: wrap;
        }
        .reg-footer .alt {
            font-family: var(--font-heading); font-weight: 600; color: var(--accent-deep); font-size: 0.95rem;
        }
        .reg-footer .alt:hover { color: var(--secondary-color); }

        .submit-btn {
            display: inline-flex; align-items: center; gap: 0.75rem;
            background: var(--accent-deep); color: white;
            border: none; cursor: pointer;
            padding: 1.1rem 2rem; border-radius: 999px;
            font-family: var(--font-heading); font-weight: 600; font-size: 1rem;
            transition: background 0.3s ease, transform 0.3s cubic-bezier(0.16,1,0.3,1);
        }
        .submit-btn:hover { background: var(--secondary-color); }
        .submit-btn .arrow {
            width: 26px; height: 26px; border-radius: 50%;
            background: var(--secondary-color); color: white;
            display: inline-flex; align-items: center; justify-content: center;
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1), background 0.3s ease;
        }
        .submit-btn:hover .arrow { background: white; color: var(--accent-deep); transform: rotate(-45deg); }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .relative { position: relative; }
        .suggestions-container {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1.5px solid rgba(14, 42, 71, 0.12);
            border-top: none;
            border-radius: 0 0 16px 16px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 30px rgba(14, 42, 71, 0.08);
            margin-top: -4px;
        }
        .suggestion-item {
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--accent-deep);
            transition: all 0.2s ease;
            font-family: var(--font-family);
            text-align: left;
        }
        .suggestion-item:hover, .suggestion-item.highlighted {
            background: rgba(255, 153, 51, 0.15);
            color: var(--accent-deep);
        }
        .suggestion-item:last-child {
            border-radius: 0 0 16px 16px;
        }
    </style>
</head>
<body>

    <div class="cursor-ring" id="cursorRing"></div>
    <div class="cursor-dot" id="cursorDot"></div>

    <div class="reg-shell">
        <a href="index.html" class="reg-back" data-magnet>← Back to home</a>
        <a href="index.html" class="reg-brand">
            <img src="media/logo.png" alt="IQ Baba"><span>IQ Baba</span>
        </a>

        <div class="reg-card">
            <div class="reg-head">
                <h1 id="regTitle">Let's <em>set up</em><br>your champion profile.</h1>
                <span class="reg-progress" id="pageSubtitle">2 minutes · free forever</span>
            </div>

            <form id="registerForm">
                <div class="section-line"><span class="num">01</span><span>Personal details</span></div>
                <div class="field-grid">
                    <div class="field">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" class="input" placeholder="e.g. Aanya Sharma" required>
                    </div>
                    <div class="field">
                        <label for="studentClass">Class Level</label>
                        <select id="studentClass" name="studentClass" class="input" required>
                            <option value="">Select your class</option>
                            <option value="6">Class 6</option>
                            <option value="7">Class 7</option>
                            <option value="8">Class 8</option>
                            <option value="9">Class 9</option>
                            <option value="10">Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                    </div>
                    <div class="field relative">
                        <label for="schoolSearch">Affiliated School</label>
                        <input type="text" id="schoolSearch" class="input" placeholder="Search school name..." autocomplete="off" required>
                        <input type="hidden" id="schoolId" name="schoolName" required>
                        <div id="schoolSuggestions" class="suggestions-container" style="display: none;"></div>
                    </div>
                    <div class="field">
                        <label for="board">Education Board</label>
                        <select id="board" name="board" class="input" required>
                            <option value="">Select your board</option>
                            <option value="CBSE">CBSE</option>
                            <option value="ICSE">ICSE</option>
                            <option value="State Board">State Board</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" class="input" placeholder="name@email.com">
                    </div>
                    <div class="field">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="input" placeholder="+91 XXXX XXX XXX">
                    </div>
                </div>

                <div class="section-line"><span class="num">02</span><span>Pick your Olympiads</span></div>
                <p class="helper">Choose up to 8 subjects you want to compete in. You can change these anytime later.</p>
                <div class="subj-tag-grid" id="subjectContainer"></div>
                <small id="subjectError" class="err-tag">⚠️ Maximum 8 subjects allowed.</small>

                <div class="reg-footer">
                    <a href="student-login.html" class="alt">← Already have an account? Sign in</a>
                    <button type="submit" class="submit-btn" data-magnet>
                        Complete registration
                        <span class="arrow">→</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script>
        // Custom cursor
        (function () {
            const dot = document.getElementById('cursorDot');
            const ring = document.getElementById('cursorRing');
            const supports = window.matchMedia('(min-width: 1025px)').matches && window.matchMedia('(pointer: fine)').matches;
            if (!supports) { dot.style.display = 'none'; ring.style.display = 'none'; return; }
            let mx = 0, my = 0, rx = 0, ry = 0;
            window.addEventListener('mousemove', (e) => {
                mx = e.clientX; my = e.clientY;
                dot.style.transform = `translate(${mx}px, ${my}px) translate(-50%, -50%)`;
            });
            (function tick() {
                rx += (mx - rx) * 0.18; ry += (my - ry) * 0.18;
                ring.style.transform = `translate(${rx}px, ${ry}px) translate(-50%, -50%)`;
                requestAnimationFrame(tick);
            })();
            document.querySelectorAll('a, button, input, select, .subject-tag, [data-magnet]').forEach(el => {
                el.addEventListener('mouseenter', () => ring.classList.add('active'));
                el.addEventListener('mouseleave', () => ring.classList.remove('active'));
            });
            document.querySelectorAll('[data-magnet]').forEach(btn => {
                btn.addEventListener('mousemove', (e) => {
                    const r = btn.getBoundingClientRect();
                    const x = (e.clientX - r.left - r.width / 2) * 0.18;
                    const y = (e.clientY - r.top - r.height / 2) * 0.18;
                    btn.style.transform = `translate(${x}px, ${y}px)`;
                });
                btn.addEventListener('mouseleave', () => { btn.style.transform = 'translate(0,0)'; });
            });
        })();

        // Search & Auto-fill logic
        let schoolsList = [];

        document.addEventListener('DOMContentLoaded', async () => {
            const schoolSearchInput = document.getElementById('schoolSearch');
            const schoolIdInput = document.getElementById('schoolId');
            const suggestionsContainer = document.getElementById('schoolSuggestions');
            let highlightedIndex = -1;
            let currentSuggestions = [];

            // 1. Fetch schools list
            try {
                const resp = await window.api.request('/auth/schools');
                schoolsList = resp || [];
            } catch (err) {
                console.warn('Failed to fetch schools from API, using mock data:', err);
                if (window.mockData && window.mockData.schools) {
                    schoolsList = window.mockData.schools.map((name, index) => ({
                        id: index + 1,
                        name: name
                    }));
                }
            }

            // 2. Autocomplete rendering & events
            function renderSuggestions(filtered) {
                currentSuggestions = filtered;
                suggestionsContainer.innerHTML = '';
                
                if (filtered.length === 0) {
                    suggestionsContainer.style.display = 'none';
                    return;
                }

                filtered.forEach((school, index) => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = school.name;
                    div.addEventListener('click', () => selectSchool(school));
                    suggestionsContainer.appendChild(div);
                });

                suggestionsContainer.style.display = 'block';
                highlightedIndex = -1;
            }

            function selectSchool(school) {
                schoolSearchInput.value = school.name;
                schoolIdInput.value = school.id;
                suggestionsContainer.style.display = 'none';
                highlightedIndex = -1;
            }

            schoolSearchInput.addEventListener('input', () => {
                schoolIdInput.value = ''; // Reset ID on change
                const val = schoolSearchInput.value.toLowerCase().trim();
                if (!val) {
                    suggestionsContainer.style.display = 'none';
                    return;
                }

                const filtered = schoolsList.filter(s => s.name.toLowerCase().includes(val));
                renderSuggestions(filtered);
            });

            // Keyboard navigation
            schoolSearchInput.addEventListener('keydown', (e) => {
                const items = suggestionsContainer.querySelectorAll('.suggestion-item');
                if (suggestionsContainer.style.display === 'block' && items.length > 0) {
                    if (e.key === 'ArrowDown') {
                        e.preventDefault();
                        highlightedIndex = (highlightedIndex + 1) % items.length;
                        updateHighlight(items);
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        highlightedIndex = (highlightedIndex - 1 + items.length) % items.length;
                        updateHighlight(items);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        if (highlightedIndex >= 0 && highlightedIndex < currentSuggestions.length) {
                            selectSchool(currentSuggestions[highlightedIndex]);
                        }
                    } else if (e.key === 'Escape') {
                        suggestionsContainer.style.display = 'none';
                        highlightedIndex = -1;
                    }
                }
            });

            function updateHighlight(items) {
                items.forEach((item, index) => {
                    if (index === highlightedIndex) {
                        item.classList.add('highlighted');
                        item.scrollIntoView({ block: 'nearest' });
                    } else {
                        item.classList.remove('highlighted');
                    }
                });
            }

            document.addEventListener('click', (e) => {
                if (e.target !== schoolSearchInput && !suggestionsContainer.contains(e.target)) {
                    suggestionsContainer.style.display = 'none';
                    const val = schoolSearchInput.value.trim().toLowerCase();
                    const exactMatch = schoolsList.find(s => s.name.toLowerCase() === val);
                    if (exactMatch) {
                        selectSchool(exactMatch);
                    }
                }
            });

            // 3. Populate Subjects
            const subjectContainer = document.getElementById('subjectContainer');
            if (window.mockData && window.mockData.subjects) {
                window.mockData.subjects.forEach((subject, index) => {
                    const label = document.createElement('label');
                    label.className = 'subject-tag';
                    label.innerHTML = `
                        <input type="checkbox" name="subjects" value="${index + 1}" onchange="handleSubjectChange(this)">
                        <span class="chk"></span>
                        <span>${subject.name}</span>
                    `;
                    subjectContainer.appendChild(label);
                });
            }

            if (window.api && window.api.getToken() && window.api.getRole() === 'student') {
                document.getElementById('regTitle').innerHTML = 'Update your <em>champion</em> profile.';
                document.getElementById('pageSubtitle').textContent = 'Edit mode';
                loadProfile();
            }
        });

        async function loadProfile() {
            try {
                const profile = await window.api.getStudentProfile();
                document.getElementById('fullName').value = profile.full_name;
                document.getElementById('studentClass').value = profile.class_level;
                
                // Lookup school by ID and populate input/hidden values
                const schoolSearchInput = document.getElementById('schoolSearch');
                const schoolIdInput = document.getElementById('schoolId');
                const school = schoolsList.find(s => s.id == profile.school_id);
                if (school) {
                    schoolSearchInput.value = school.name;
                    schoolIdInput.value = school.id;
                }
                
                document.getElementById('board').value = profile.board;
                document.getElementById('email').value = profile.email || '';
                document.getElementById('phone').value = profile.phone || '';
                if (profile.subjects) {
                    profile.subjects.forEach(id => {
                        const cb = document.querySelector(`input[name="subjects"][value="${id}"]`);
                        if (cb) {
                            cb.checked = true;
                            cb.parentElement.classList.add('selected');
                        }
                    });
                }
            } catch (error) { console.error(error); }
        }

        function handleSubjectChange(checkbox) {
            const checkedCount = document.querySelectorAll('input[name="subjects"]:checked').length;
            const errorMsg = document.getElementById('subjectError');
            if (checkedCount > 8) {
                checkbox.checked = false;
                errorMsg.style.display = 'block';
            } else {
                errorMsg.style.display = 'none';
            }
            if (checkbox.checked) checkbox.parentElement.classList.add('selected');
            else checkbox.parentElement.classList.remove('selected');
        }

        document.getElementById('registerForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const checkedCount = document.querySelectorAll('input[name="subjects"]:checked').length;
            if (checkedCount === 0) {
                window.showNotification('Please select at least one subject.', 'danger');
                return;
            }

            const formData = window.serializeForm(this);
            const submitBtn = this.querySelector('button[type="submit"]');
            try {
                submitBtn.disabled = true;
                submitBtn.innerHTML = 'Processing… <span class="arrow">⏳</span>';

                const payload = {
                    fullName: formData.fullName,
                    studentClass: formData.studentClass,
                    schoolId: parseInt(formData.schoolName),
                    board: formData.board,
                    email: formData.email,
                    phone: formData.phone,
                    subjects: Array.isArray(formData.subjects) ? formData.subjects.map(id => parseInt(id)) : [parseInt(formData.subjects)]
                };

                if (window.api.getToken() && window.api.getRole() === 'student') {
                    await window.api.updateStudentProfile(payload);
                    window.showNotification('Profile updated!', 'success');
                } else {
                    payload.password = 'password123';
                    await window.api.registerStudent(payload);
                    window.showNotification('Welcome aboard! Registration complete.', 'success');
                }

                setTimeout(() => { window.location.href = 'student-dashboard.html'; }, 1000);
            } catch (error) {
                window.showNotification(error.message || 'Error occurred.', 'danger');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Complete registration <span class="arrow">→</span>';
            }
        });
    </script>
</body>
</html>
