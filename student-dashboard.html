<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard - IQ Baba</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .dashboard-header {
            background: white;
            box-shadow: var(--shadow-sm);
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .profile-info h2 {
            margin-bottom: 0;
            color: var(--primary-color);
        }
        .profile-info p {
            margin-bottom: 0;
            font-size: 0.875rem;
        }
        .subject-card {
            transition: transform var(--transition-fast), box-shadow var(--transition-fast);
            position: relative;
            overflow: hidden;
        }
        .subject-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }
        .subject-card.completed {
            opacity: 0.8;
            background: #F9FAFB;
        }
        .card-header {
            border-bottom: 1px solid #E5E7EB;
            padding-bottom: 1rem;
            margin-bottom: 1rem;
        }
        .card-header h3 {
            margin-bottom: 0.25rem;
        }
        .card-meta {
            display: flex;
            gap: 1rem;
            color: var(--text-grey);
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .card-meta span {
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        .status-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
        }
    </style>
</head>
<body>
    <header class="dashboard-header">
        <div class="container header-content">
            <div class="profile-info">
                <img src="media/logo.png" alt="IQ BABA Logo" style="height: 50px; margin-bottom: 0.5rem;">
                <h2 id="studentWelcome">Welcome, Student!</h2>
                <p id="studentMeta" class="text-grey">Track your progress and excel in your exams.</p>
            </div>
            <div class="actions">
                <a href="student-register.html" class="btn btn-outline" style="padding: 0.5rem 1.25rem; font-size: 0.9rem; margin-right: 0.5rem;">Edit Profile</a>
                <a href="javascript:void(0)" onclick="window.handleLogout()" class="btn btn-secondary" style="padding: 0.5rem 1.25rem; font-size: 0.9rem;">Logout</a>
            </div>
        </div>
    </header>

    <main class="container min-h-screen">
        <h3 class="mb-3">My Subjects</h3>
        
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-4" id="subjectsGrid">
            <!-- Populated via JS -->
        </div>

        <h3 class="mt-4 mb-3">Completed Exams</h3>
        <div class="glass-card mb-4" style="padding: 0;">
            <div class="table-container">
                <table id="completedExamsTable">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Date Completed</th>
                            <th>Score</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!window.api.getToken() || window.api.getRole() !== 'student') {
                window.location.href = 'student-login.html';
                return;
            }

            const subjectsGrid = document.getElementById('subjectsGrid');
            const completedExamsTable = document.querySelector('#completedExamsTable tbody');
            
            try {
                const data = await window.api.getStudentDashboard();
                
                // Clear loading state
                subjectsGrid.innerHTML = '';
                completedExamsTable.innerHTML = '';

                // Map past results for easy checking
                const completedExamsMap = {};
                data.pastResults.forEach(r => {
                    completedExamsMap[r.exam_title] = r;
                });

                if (data.upcomingExams.length === 0 && data.pastResults.length === 0) {
                    subjectsGrid.innerHTML = '<p class="text-grey col-span-3">No exams assigned to your enrolled subjects currently.</p>';
                }

                // Render Upcoming/Available Exams
                data.upcomingExams.forEach(exam => {
                    const isCompleted = completedExamsMap[exam.title] ? true : false;
                    
                    const card = document.createElement('div');
                    card.className = `glass-card subject-card ${isCompleted ? 'completed' : ''}`;
                    
                    card.innerHTML = `
                        <div class="status-badge badge ${isCompleted ? 'badge-success' : 'badge-warning'}">
                            ${isCompleted ? 'Completed' : 'Available'}
                        </div>
                        <div class="card-header mt-2">
                            <h3>${exam.title}</h3>
                            <p class="text-xs text-grey m-0">${exam.subject_name}</p>
                        </div>
                        <div class="card-meta">
                            <span>
                                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                ${exam.duration_minutes} mins
                            </span>
                        </div>
                        ${isCompleted ? 
                            `<button class="btn btn-outline btn-block" disabled>Exam Completed</button>` : 
                            `<button class="btn btn-primary btn-block" onclick="startExam('${exam.id}')">Start Exam</button>`
                        }
                    `;
                    
                    subjectsGrid.appendChild(card);
                });
                
                // Render Past Results
                if (data.pastResults.length === 0) {
                    completedExamsTable.innerHTML = '<tr><td colspan="4" class="text-center text-grey">No completed exams yet.</td></tr>';
                } else {
                    data.pastResults.forEach(result => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td class="font-bold">${result.exam_title}</td>
                            <td>${new Date(result.date_taken).toLocaleDateString()}</td>
                            <td>${result.percentage}%</td>
                            <td><span class="badge badge-success">Submitted</span></td>
                        `;
                        completedExamsTable.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error("Failed to load dashboard data", error);
            }
        });

        function startExam(examId) {
            localStorage.setItem('currentExam', examId);
            window.location.href = 'exam-interface.html';
        }
    </script>
</body>
</html>
